# ─────────────────────────────────────────────────────────
# Nawal AI — CI/CD Pipeline
# Trigger: push to main  ·  manual dispatch
# Flow:    test → build → push ACR → deploy AKS
# ─────────────────────────────────────────────────────────

name: Deploy nawal-ai

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: belizechainacr.azurecr.io
  IMAGE_NAME: nawal

# Only one deploy at a time; cancel superseded runs
concurrency:
  group: deploy-nawal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Test ─────────────────────────────────────────────
  test:
    name: 🧪 Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyTorch (CPU)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          sed -e '/^torch/d' -e '/^torchvision/d' -e 's/flwr\[simulation\]/flwr/' requirements.txt > /tmp/ci-req.txt
          pip install -r /tmp/ci-req.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short -m "not integration"

  # ── 2. Build & Push ────────────────────────────────────
  build:
    name: 🐳 Build & Push Image (${{ matrix.compute }})
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        compute: [cpu, gpu]
    # ACR credentials (ACR_USERNAME / ACR_PASSWORD) must be valid in GitHub Secrets.
    # If login fails with 403, rotate the credentials in Azure Portal and
    # update the secrets at: Settings → Secrets and variables → Actions → Secrets.
    steps:
      - uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=-${{ matrix.compute }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          build-args: COMPUTE=${{ matrix.compute }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── 3. Deploy to AKS ──────────────────────────────────
  deploy:
    name: 🚀 Deploy to Testnet (AKS)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Create namespace (if needed)
        run: kubectl create namespace belizechain --dry-run=client -o yaml | kubectl apply -f -

      - name: Compute image tag
        id: img
        run: echo "tag=${GITHUB_SHA::7}-cpu" >> "$GITHUB_OUTPUT"

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/pvc.yaml
          sed "s|__IMAGE__|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.img.outputs.tag }}|" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout
        id: rollout
        run: kubectl rollout status deployment/nawal-ai -n belizechain --timeout=300s

      - name: Post-deploy health check
        run: |
          # Wait for pod readiness then verify /health from inside the cluster
          POD=$(kubectl get pods -n belizechain -l app=nawal-ai -o jsonpath='{.items[0].metadata.name}')
          STATUS=$(kubectl exec -n belizechain "$POD" -- curl -sf -o /dev/null -w '%{http_code}' http://localhost:8080/health || echo 000)
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed ($STATUS) — rolling back"
            kubectl rollout undo deployment/nawal-ai -n belizechain
            kubectl rollout status deployment/nawal-ai -n belizechain --timeout=120s
            exit 1
          fi

      - name: Rollback on failure
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "::warning::Rollout failed — rolling back to previous revision"
          kubectl rollout undo deployment/nawal-ai -n belizechain
          kubectl rollout status deployment/nawal-ai -n belizechain --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pvc -n belizechain
          kubectl get pods -n belizechain -o wide
          kubectl get svc -n belizechain
