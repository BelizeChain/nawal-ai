apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nawal-checkpoints
  namespace: belizechain
  labels:
    app: nawal-ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nawal-models
  namespace: belizechain
  labels:
    app: nawal-ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi
  resources:
    requests:
      storage: 2Gi
