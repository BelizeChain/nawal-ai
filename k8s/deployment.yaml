apiVersion: apps/v1
kind: Deployment
metadata:
  name: nawal-ai
  namespace: belizechain
  labels:
    app: nawal-ai
    component: federated-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nawal-ai
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nawal-ai
        component: federated-learning
    spec:
      containers:
        - name: nawal-ai
          image: belizechainacr.azurecr.io/nawal:latest
          ports:
            - containerPort: 8080
              name: api
          envFrom:
            - configMapRef:
                name: belizechain-config
            - secretRef:
                name: belizechain-secrets
          env:
            - name: BLOCKCHAIN_RPC
              value: "ws://belizechain-node.belizechain.svc.cluster.local:9944"
            - name: ENVIRONMENT
              value: "production"
            - name: WORKERS
              value: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: checkpoints
              mountPath: /var/lib/nawal/checkpoints
            - name: models
              mountPath: /app/models
      volumes:
        - name: checkpoints
          emptyDir: {}
        - name: models
          emptyDir: {}
